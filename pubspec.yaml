name: otlp_dart
description: OpenTelemetry Protocol (OTLP) client library for Dart. Export traces, metrics, and logs to OTLP-compatible backends like .NET Aspire Dashboard.
version: 0.1.0
repository: https://github.com/jamiewest/otlp-dart

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  http: ^1.2.0
  http2: ^2.3.0
  protobuf: ^6.0.0
  fixnum: ^1.1.0
  collection: ^1.18.0

dev_dependencies:
  lints: ^3.0.0
  test: ^1.25.0
  mockito: ^5.4.4
  build_runner: ^2.4.8
  protoc_plugin: ^25.0.0
